<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SQLGuard Dashboard</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 40px; }
        textarea { width: 100%; height: 100px; }
        button { padding: 10px 20px; font-size: 16px; margin-top: 10px; cursor: pointer; }
        #result { margin-top: 20px; padding: 20px; border: 1px solid #ccc; display: none; }
    </style>
</head>
<body>
    <h1>SQLGuard ML Dashboard</h1>
    <p>Test your payloads for SQL Injection or Cross-Site Scripting (XSS).</p>
    <textarea id="payload" placeholder="Enter payload here..."></textarea>
    <br>
    <button onclick="detect()">Detect</button>

    <div id="result">
        <h3>Result: <span id="label"></span></h3>
        <p>Confidence: <span id="confidence"></span></p>
    </div>

    <script>
        async function detect() {
            const payload = document.getElementById("payload").value;
            if (!payload) return;

            const res = await fetch("/api/v1/detect", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ payload })
            });

            const data = await res.json();
            
            if (res.ok) {
                document.getElementById("result").style.display = "block";
                document.getElementById("label").innerText = data.label;
                document.getElementById("confidence").innerText = (data.confidence * 100).toFixed(2) + "%";
            } else {
                alert("Error: " + data.detail);
            }
        }
    </script>
</body>
</html>
