name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read

jobs:
  test-node:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: [18.x, 20.x, 22.x]
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
          cache-dependency-path: npm/package-lock.json
      - name: Install dependencies
        run: |
          cd npm
          npm ci
      - name: Test
        run: |
          cd npm
          npm test
      - name: Audit dependencies
        run: |
          cd npm
          npm audit --audit-level=moderate
      - name: Verify package contents
        run: |
          cd npm
          npm pack --dry-run

  test-python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Use Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install build pytest pip-audit httpx
          cd python
          python -m pip install -e .[test]
      - name: Test
        run: |
          cd python
          pytest
      - name: Audit dependencies
        run: pip-audit
      - name: Verify wheel contents
        run: |
          cd python
          python -m build --wheel
          python - <<'PY'
          import zipfile
          from pathlib import Path
          wheel = next(Path("dist").glob("*.whl"))
          names = set(zipfile.ZipFile(wheel).namelist())
          required = {
              "sqlguardjs/models/stub_model.pkl",
              "sqlguardjs/models/stub_vectorizer.pkl",
              "sqlguardjs/models/attack_cnn_lstm.h5",
              "sqlguardjs/models/tokenizer.json",
              "sqlguardjs/models/label_encoder.pkl",
          }
          model_files = {name for name in names if name.startswith("sqlguardjs/models/")}
          missing = sorted(required - names)
          if missing:
              raise SystemExit(f"missing package data: {missing}")
          unexpected = sorted(model_files - required)
          if unexpected:
              raise SystemExit(f"unexpected model files: {unexpected}")
          PY
